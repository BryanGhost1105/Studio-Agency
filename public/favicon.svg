<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Elegant gold gradient to represent cinematic light refraction -->
    <linearGradient id="prism-grad" x1="12" y1="12" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#DEDBC8" />
      <stop offset="100%" stop-color="#8C8974" />
    </linearGradient>
    <linearGradient id="spectrum-grad" x1="16" y1="24" x2="44" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DEDBC8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFAE73" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Subtle dark viewport boundary echoing camera viewfinders -->
  <rect width="48" height="48" rx="10" fill="#0A0A0A" />
  <rect x="1.5" y="1.5" width="45" height="45" rx="8.5" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" />
  
  <!-- Refracting Line Spectrum -->
  <path d="M 14,24 L 28,16 L 40,24 L 28,32 Z" stroke="url(#spectrum-grad)" stroke-width="1.5" stroke-dasharray="2 1" opacity="0.6" />
  
  <!-- The Primary Prism / Play Shape -->
  <path d="M 18,12 L 36,24 L 18,36 Z" fill="url(#prism-grad)" />
  
  <!-- Camera Lens Reticle details -->
  <path d="M 6,10 L 6,6 L 10,6" stroke="#DEDBC8" stroke-width="1" opacity="0.4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 42,10 L 42,6 L 38,6" stroke="#DEDBC8" stroke-width="1" opacity="0.4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 6,38 L 6,42 L 10,42" stroke="#DEDBC8" stroke-width="1" opacity="0.4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 42,38 L 42,42 L 38,42" stroke="#DEDBC8" stroke-width="1" opacity="0.4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
